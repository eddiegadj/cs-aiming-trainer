<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter-Strike Aim Trainer – Improve Your CS Aim Free Online</title>
  <meta name="description" content="Free browser-based aim trainer for Counter-Strike. Practice flick shots, reaction time, and accuracy. No download—improve your CS aim in minutes." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <main class="arena">
      <div class="canvas-wrap" id="gameContainer">
        <div id="crosshair" class="crosshair" aria-hidden="true"></div>
        <div id="flashOverlay" class="flash-overlay" aria-hidden="true"></div>
        <div id="countdown" class="countdown" aria-live="polite" aria-hidden="true"></div>
      </div>
      <div id="resultsOverlay" class="results-overlay hidden" aria-hidden="true">
        <div class="results-overlay-content">
          <div class="results-stats">
            <h2 class="results-title">Results</h2>
            <p><span>Score</span> <strong id="resultScore">0</strong></p>
            <p><span>Hits</span> <strong id="resultHits">0</strong></p>
            <p><span>Misses</span> <strong id="resultMisses">0</strong></p>
            <p><span>Accuracy</span> <strong id="resultAccuracy">—</strong></p>
            <p><span>Avg. time to hit</span> <strong id="resultReaction">—</strong></p>
            <button type="button" id="resultsStartAgainBtn" class="cta-primary">Start round again</button>
            <button type="button" id="resultsBackBtn" class="cta-secondary">Back to main</button>
          </div>
        </div>
      </div>
      <div id="overlay" class="ui-overlay">
        <header class="header">
            <h1>Counter-Strike Aim Trainer</h1>
            <p class="overlay-message header-sub">Hit red targets, practice flick shots and reaction time—misses count against accuracy.</p>
            <hr class="header-divider" />

            <!-- <div class="stats">
              <span class="stat" data-stat="score">Score: <strong>0</strong></span>
              <span class="stat" data-stat="hits">Hits: <strong>0</strong></span>
              <span class="stat" data-stat="misses">Misses: <strong>0</strong></span>
              <span class="stat" data-stat="accuracy">Accuracy: <strong>—</strong></span>
              <span class="stat" data-stat="reaction">Avg. time to hit: <strong>—</strong></span>
            </div>
            <hr class="header-divider" /> -->
            <div class="controls">
              <label>
                <span>Target size</span>
                <select id="targetSize">
                  <option value="24">Small</option>
                  <option value="32" selected>Medium</option>
                  <option value="44">Large</option>
                </select>
              </label>
              <label>
                <span>Duration (sec)</span>
                <input type="number" id="duration" value="60" min="5" max="180" />
              </label>
              <label class="sensitivity-label">
                <span>Sensitivity</span>
                <span class="control-right">
                  <input type="range" id="sensitivity" min="0.25" max="2" step="0.05" value="1.3" />
                  <span id="sensitivityValue">1.3</span>
                </span>
              </label>
              <button type="button" id="startBtn" class="cta-primary">Start Round</button>
              <p class="controls-caption">ESC to finish round</p>
              <!-- <button type="button" id="resetBtn">Reset</button> -->
            </div>
        </header>
      </div>
    </main>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
